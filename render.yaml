services:
  - type: web
    name: petasight-chatbot-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        value: sqlite:///./chatbot.db
      - key: CORS_ORIGINS
        value: https://petasight-chatbot.vercel.app
        
